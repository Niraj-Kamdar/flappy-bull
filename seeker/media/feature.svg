  <g transform="translate(300 305) scale(0.62) translate(-512 -512)">
    <g fill="#F8F5E3">
      <path d="M 392 452 C 360 408 372 372 410 366 C 404 392 416 420 444 442 Z"/>
      <path d="M 632 452 C 664 408 652 372 614 366 C 620 392 608 420 580 442 Z"/>
      <path d="M 512 432 C 446 432 410 476 410 536 C 410 596 456 632 512 632 C 568 632 614 596 614 536 C 614 476 578 432 512 432 Z"/>
    </g>
    <g fill="#0D0D2B">
      <ellipse cx="512" cy="586" rx="46" ry="30"/>
      <circle cx="476" cy="520" r="13"/><circle cx="548" cy="520" r="13"/>
      <circle cx="498" cy="592" r="7"/><circle cx="526" cy="592" r="7"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="470" y="285" font-family="'Press Start 2P', monospace" font-size="64" font-weight="700" fill="#9945FF">FLAPPY</text>
  <text x="470" y="360" font-family="'Press Start 2P', monospace" font-size="64" font-weight="700" fill="#14F195">BULL</text>
