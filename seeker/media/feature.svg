<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A22"/>
      <stop offset="100%" stop-color="#050510"/>
    </linearGradient>
    <linearGradient id="chan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14F195" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#9945FF" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- candle channel band across -->
  <path d="M 0 250 L 1200 215 L 1200 400 L 0 365 Z" fill="url(#chan)"/>
  <g>
    <rect x="60"   y="0"   width="40" height="210" rx="6" fill="#14F195" opacity="0.85"/>
    <rect x="60"   y="405" width="40" height="195" rx="6" fill="#14F195" opacity="0.85"/>
    <rect x="150"  y="0"   width="40" height="180" rx="6" fill="#FF3B5C" opacity="0.85"/>
    <rect x="150"  y="430" width="40" height="170" rx="6" fill="#FF3B5C" opacity="0.85"/>
    <rect x="1010" y="0"   width="40" height="195" rx="6" fill="#14F195" opacity="0.85"/>
    <rect x="1010" y="420" width="40" height="180" rx="6" fill="#14F195" opacity="0.85"/>
    <rect x="1100" y="0"   width="40" height="230" rx="6" fill="#14F195" opacity="0.85"/>
    <rect x="1100" y="395" width="40" height="205" rx="6" fill="#14F195" opacity="0.85"/>
  </g>

